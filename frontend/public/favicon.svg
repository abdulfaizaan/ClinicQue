  />

  <!-- Person Head -->
  <circle cx="50" cy="46" r="6" fill="url(#crossFill)" stroke="url(#crossStroke)" stroke-width="4.5" />
  
  <!-- Person Body -->
  <path d="M 37 85 L 37 72 A 13 13 0 0 1 63 72 L 63 85" fill="url(#crossFill)" stroke="url(#crossStroke)" stroke-width="4.5" stroke-linejoin="round" />

